<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="New customer intake form for BuyIASLeads — tell us how to reach you and where to deliver your indexed annuity leads.">
    <title>Intake Form - BuyIASLeads</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy-dark: #ffffff;
            --navy-light: #f6f7fb;
            --gold: #4f46e5;
            --gold-light: #4338ca;
            --text-primary: #17163a;
            --text-secondary: #4b5563;
            --border-color: #e6e8ec;
            --success: #0f7a4d;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text-primary);
            background: linear-gradient(180deg, #ffffff 0%, #f6f7fb 100%);
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: #ffffff;
            border-bottom: 1px solid var(--border-color);
            padding: 20px 0;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Crimson Text', serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--gold);
            text-decoration: none;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-left: 28px;
            transition: color 0.3s;
        }

        nav a:hover { color: var(--gold); }

        main { max-width: 640px; margin: 0 auto; padding: 130px 20px 60px; }

        .intake-header { text-align: center; margin-bottom: 36px; }

        .intake-header h1 {
            font-family: 'Crimson Text', serif;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .intake-header p { color: var(--text-secondary); font-size: 16px; }

        .card {
            background: #f8f9fb;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px;
        }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group textarea { resize: vertical; min-height: 90px; }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus { outline: none; border-color: var(--gold); }

        .form-group input::placeholder,
        .form-group textarea::placeholder { color: var(--text-secondary); }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--gold);
            color: var(--navy-dark);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .submit-btn:hover { background: var(--gold-light); transform: translateY(-2px); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .form-error { color: #ff6b6b; font-size: 13px; margin-top: 14px; text-align: center; min-height: 18px; }

        .thankyou { display: none; text-align: center; padding: 20px 10px; }
        .thankyou.show { display: block; }
        .thankyou .check { font-size: 56px; color: var(--success); margin-bottom: 12px; }
        .thankyou h2 { font-family: 'Crimson Text', serif; font-size: 32px; color: var(--success); margin-bottom: 12px; }
        .thankyou p { color: var(--text-secondary); margin-bottom: 26px; }

        .btn-primary {
            display: inline-block;
            background: var(--gold);
            color: var(--navy-dark);
            padding: 14px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }

        @media (max-width: 600px) {
            main { padding-top: 110px; }
            .intake-header h1 { font-size: 30px; }
            .card { padding: 22px; }
            .header-content { padding: 0 20px; }
            nav a:first-child { display: none; }
        }
/* --- depth + contrast (site-wide) --- */
header { box-shadow: 0 2px 16px rgba(23,22,58,0.06); }
.lead-card, .testimonial, .stage, .stat-box, .faq-question, .card, .checkout-container, .success-container, .stack-item, .step, .example, .email, .tcard, .calc, .compare, .crow { box-shadow: 0 6px 22px rgba(23,22,58,0.07) !important; }
.lead-card:hover, .testimonial:hover, .stage:hover, .faq-question:hover { box-shadow: 0 12px 30px rgba(79,70,229,0.16) !important; transform: translateY(-3px); }
button, .cta-btn, .cta-button, .order-btn-large, .submit-btn, .btn-primary, .lead-card button, .btn-secondary { box-shadow: 0 8px 20px rgba(79,70,229,0.26); }
body { background: linear-gradient(180deg, #ffffff 0%, #edeff7 100%) !important; overflow-x: hidden; }
.dark-band { width: 100vw; max-width: none !important; margin-left: calc(50% - 50vw); padding-top: 48px !important; padding-bottom: 54px !important; text-align: center; background: repeating-linear-gradient(45deg, rgba(255,255,255,0.04) 0, rgba(255,255,255,0.04) 1px, transparent 1px, transparent 46px), repeating-linear-gradient(-45deg, rgba(255,255,255,0.04) 0, rgba(255,255,255,0.04) 1px, transparent 1px, transparent 46px), radial-gradient(1200px 520px at 50% -10%, #2c2770 0%, #1c1a45 55%, #131229 100%) !important; border-bottom: 1px solid #2a2860; margin-bottom: 20px; }
.dark-band h1 { color: #ffffff !important; }
.dark-band p, .dark-band .updated, .dark-band .subtitle { color: #cdd0ea !important; }
    </style>
<!-- Meta Pixel + UTM capture (BuyIASLeads) -->
<script>
(function(){
  try {
    var qs = new URLSearchParams(location.search), utm = {};
    ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','utm_id'].forEach(function(k){ if(qs.get(k)) utm[k]=qs.get(k); });
    if (Object.keys(utm).length) sessionStorage.setItem('bial_utm', JSON.stringify(utm));
  } catch(e){}
  window.BIAL_PIXEL_ID = 'REPLACE_WITH_META_PIXEL_ID';
  if (window.BIAL_PIXEL_ID && window.BIAL_PIXEL_ID.indexOf('REPLACE') === -1) {
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', window.BIAL_PIXEL_ID);
    fbq('track', 'PageView');
  }
})();
</script>

</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">BUYIASLEADS</a>
            <nav>
                <a href="index.html">Home</a>
                <a href="fia-leads.html">FIA Leads</a>
                <a href="faq.html">FAQ</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="intake-header dark-band">
            <h1>New Customer Intake</h1>
            <p>Thanks for your order! Fill this out so we can get your leads set up correctly.</p>
            <p id="orderLine" style="display:none; margin-top:10px; color: var(--gold); font-weight:600;"></p>
        </div>

        <div class="card">
            <form id="intakeForm" onsubmit="handleIntake(event)">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="fullName" placeholder="John Smith" required>
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label>Phone *</label>
                    <input type="tel" id="phone" placeholder="(555) 123-4567" required>
                </div>

                <div class="form-group">
                    <label>Best Time to Reach You</label>
                    <select id="bestTime">
                        <option value="">No preference</option>
                        <option value="Morning">Morning</option>
                        <option value="Afternoon">Afternoon</option>
                        <option value="Evening">Evening</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Anything else we should know?</label>
                    <textarea id="notes" placeholder="Questions, the states you want leads in, products you focus on, etc."></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit</button>
                <div class="form-error" id="formError"></div>
            </form>

            <div class="thankyou" id="thankyou">
                <div class="check">&#10003;</div>
                <h2>Thank You!</h2>
                <p>We've got your information and will be in touch shortly. Next, book your onboarding call so we can get you up and running.</p>
                <a href="https://calendly.com/gregorystevenson/1-on-1-with-gregory-stevenson-30-min" class="btn-primary">Book Your Onboarding Call</a>
            </div>
        </div>
    </main>

    <script>
        // The site is served by GitHub Pages (static), while the backend runs on
        // Railway. Post the form to the Railway backend unless we're already on it.
        const RAILWAY_BACKEND = 'https://buyiasleads-production.up.railway.app';
        const BACKEND_URL =
            (/\.railway\.app$/.test(location.hostname) || location.hostname === 'localhost' || location.hostname === '127.0.0.1')
                ? ''
                : RAILWAY_BACKEND;

        // Which package they ordered, passed from the success page (?pkg=...).
        const ORDER_PKG = new URLSearchParams(location.search).get('pkg') || '';
        (function () {
            if (ORDER_PKG) {
                var label = (ORDER_PKG === 'test') ? 'Test order' : (ORDER_PKG + ' leads');
                var el = document.getElementById('orderLine');
                el.textContent = 'Your order: ' + label;
                el.style.display = 'block';
            }
        })();

        async function handleIntake(e) {
            e.preventDefault();
            const errEl = document.getElementById('formError');
            errEl.textContent = '';

            const payload = {
                fullName: document.getElementById('fullName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                bestTime: document.getElementById('bestTime').value,
                notes: document.getElementById('notes').value.trim(),
                leadOrder: ORDER_PKG
            };

            if (!payload.fullName || !payload.email || !payload.phone) {
                errEl.textContent = 'Please fill in your name, email, and phone.';
                return;
            }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(payload.email)) {
                errEl.textContent = 'Please enter a valid email address.';
                return;
            }

            const btn = e.target.querySelector('.submit-btn');
            btn.disabled = true;
            btn.textContent = 'Submitting...';

            try {
                const resp = await fetch(`${BACKEND_URL}/intake`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!resp.ok) {
                    const data = await resp.json().catch(() => ({}));
                    throw new Error(data.error || 'Submission failed. Please try again.');
                }
                document.getElementById('intakeForm').style.display = 'none';
                document.getElementById('thankyou').classList.add('show');
            } catch (err) {
                errEl.textContent = err.message;
                btn.disabled = false;
                btn.textContent = 'Submit';
            }
        }
    </script>
</body>
</html>
