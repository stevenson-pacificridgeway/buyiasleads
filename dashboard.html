<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Dashboard</title><link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet"><style>:root{--navy:#0a0a0a;--gold:#d4a574;--text1:#f5f7fa;--text2:#b8c5d6;--border:rgba(212,165,116,0.15)}*{margin:0;padding:0;box-sizing:border-box}body{background:linear-gradient(135deg,var(--navy),#14192a);color:var(--text1);font-family:Inter;min-height:100vh}.header{background:rgba(10,10,10,0.95);border-bottom:1px solid var(--border);padding:1.5rem;position:sticky;top:0}.header-content{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between}.logo{font-size:1.5rem;font-weight:600;color:var(--gold);letter-spacing:2px}.nav-links{display:flex;gap:2rem}.nav-links a{color:var(--text2);text-decoration:none}.nav-links a.active{color:var(--gold)}.container{max-width:1400px;margin:0 auto;padding:2rem}h1{font-size:2.5rem;color:var(--text1)}.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1.5rem;margin:2rem 0}.stat-card{background:rgba(26,31,46,0.6);border:1px solid var(--border);border-radius:12px;padding:1.5rem}.stat-value{font-size:2rem;font-weight:600;color:var(--gold)}.tabs{display:flex;border-bottom:1px solid var(--border);margin:2rem 0}.tab-btn{background:0;border:0;color:var(--text2);padding:1rem 1.5rem;cursor:pointer;border-bottom:2px solid transparent}.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}.tab-content{display:none}.tab-content.active{display:block}</style></head><body><div class="header"><div class="header-content"><div class="logo">BUYIASLEADS</div><div class="nav-links"><a href="index.html">HOME</a><a href="leads-marketplace.html">BROWSE LEADS</a><a href="dashboard.html" class="active">DASHBOARD</a></div></div></div><div class="container"><h1>Your Dashboard</h1><div class="stats-grid"><div class="stat-card"><div style="color:var(--text2)">TOTAL LEADS</div><div class="stat-value">550</div></div><div class="stat-card"><div style="color:var(--text2)">DOWNLOADED</div><div class="stat-value">340</div></div><div class="stat-card"><div style="color:var(--text2)">QUALITY</div><div class="stat-value">92%</div></div><div class="stat-card"><div style="color:var(--text2)">SPENT</div><div class="stat-value">$9K</div></div></div><div class="tabs"><button class="tab-btn active" onclick="switchTab(0)">MY LEADS</button><button class="tab-btn" onclick="switchTab(1)">ORDERS</button><button class="tab-btn" onclick="switchTab(2)">INVOICES</button></div><div class="tab-content active"><h2>Your Leads</h2></div><div class="tab-content"><h2>Your Orders</h2></div><div class="tab-content"><h2>Invoices</h2></div></div><script>function switchTab(i){document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.tab-content')[i].classList.add('active');document.querySelectorAll('.tab-btn')[i].classList.add('active')}</script></body></html>
